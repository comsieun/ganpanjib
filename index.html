<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Document</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 스크롤 방지 */
        }

        .background-container {
            position: relative;
            width: 100%;
            max-width: 375px; /* 모바일 기준 너비 */
            height: 100%;
            max-height: 812px; /* 모바일 기준 높이 */
            background: url('imgMain/full.png') no-repeat center center;
            background-size: cover; /* 배경 이미지가 박스에 꽉 차도록 설정 */
        }

        .button {
            position: absolute; /* 버튼 위치를 절대적으로 설정 */
            cursor: pointer; /* 마우스 커서가 손 모양으로 변하도록 */
            transition: transform 0.3s ease-in-out; /* 부드러운 회전 효과 */
        }

        .button img {
            display: block; /* 이미지 주변 여백 제거 */
            height: auto; /* 원래 비율 유지 */
        }

        /* 각 버튼의 애니메이션 정의 */
        @keyframes bobbing1 {
            0%, 100% {
                transform: rotate(-2deg); /* 초기 회전 상태 */
            }
            50% {
                transform: rotate(2deg); /* 중간에 반대 방향으로 회전 */
            }
        }

        @keyframes bobbing2 {
            0%, 100% {
                transform: rotate(-2deg); /* 초기 회전 상태 */
            }
            50% {
                transform: rotate(2deg); /* 중간에 반대 방향으로 회전 */
            }
        }

        @keyframes bobbing3 {
            0%, 100% {
                transform: rotate(-2deg); /* 초기 회전 상태 */
            }
            50% {
                transform: rotate(2deg); /* 중간에 반대 방향으로 회전 */
            }
        }

        @keyframes bobbing4 {
            0%, 100% {
                transform: rotate(-2deg); /* 초기 회전 상태 */
            }
            50% {
                transform: rotate(2deg); /* 중간에 반대 방향으로 회전 */
            }
        }

        @keyframes zooming {
            0%, 100% {
                transform: scale(1); /* 초기 크기 */
            }
            50% {
                transform: scale(1.1); /* 확대된 크기 */
            }
        }

        @keyframes moving {
            0% {
                transform: translateX(0); /* 초기 위치 */
            }
            50% {
                transform: translateX(50px); /* 오른쪽으로 50px 이동 */
            }
            100% {
                transform: translateX(0); /* 초기 위치로 돌아옴 */
            }
        }

        .button1 {
            top: 54%; /* 상단에서 52% 위치 */
            left: 14%; /* 왼쪽에서 14% 위치 */
            transform: translate(-50%, -50%) rotate(-3deg); /* 좌측 회전 */
            animation: bobbing1 2s infinite ease-in-out; /* 애니메이션 적용 */
        }

        .button2 {
            top: 62%; /* 상단에서 60% 위치 */
            left: 40%; /* 왼쪽에서 37% 위치 */
            transform: translate(-50%, -50%) rotate(3deg); /* 우측 회전 */
            animation: bobbing2 2.5s infinite ease-in-out; /* 애니메이션 적용 */
        }

        .button3 {
            bottom: 20%; /* 하단에서 23% 위치 */
            left: 21%; /* 왼쪽에서 21% 위치 */
            transform: translate(-50%, 50%) rotate(-3deg); /* 좌측 회전 */
            animation: bobbing3 3s infinite ease-in-out; /* 애니메이션 적용 */
        }

        .button4 {
            bottom: 20%; /* 하단에서 20% 위치 */
            right: 24%; /* 오른쪽에서 24% 위치 */
            transform: translate(30%, 30%) rotate(1deg); /* 우측 회전 */
            animation: bobbing4 1.5s infinite ease-in-out; /* 애니메이션 적용 */
        }

        .cloud {
            position: absolute; /* 위치 절대적으로 설정 */
            transform: translate(-50%, -50%); /* 중앙 정렬 */
            animation:  moving 20s infinite ease-in-out; /* 확대 축소 및 좌우 이동 애니메이션 적용 */
            animation-fill-mode: both; /* 애니메이션이 끝난 후 마지막 상태와 시작 상태 유지 */
        }

        .cloud1 {
            top: 15%; /* 상단에서 15% 위치 */
            left: 15%; /* 왼쪽에서 15% 위치 */
            animation-delay: 0s; /* 애니메이션 지연 없음 */
        }

        .cloud2 {
            top: 10%; /* 상단에서 10% 위치 */
            left: 60%; /* 왼쪽에서 60% 위치 */
            animation-delay: 2s; /* 애니메이션 시작 지연 */
        }

        .cloud3 {
            top: 4%; /* 상단에서 4% 위치 */
            left: -10%; /* 왼쪽에서 -10% 위치 */
            animation-delay: 4s; /* 애니메이션 시작 지연 */
        }

        /* 이미지 크기 조정 */
        .button1 img {
            width: 190px; /* 가로로 긴 이미지의 너비 조정 */
        }

        .button2 img {
            width: 150px; /* 가로로 긴 이미지의 너비 조정 */
        }

        .button3 img {
            width: 60px; /* 세로로 긴 이미지의 너비 조정 */
        }
        .button4 img {
            width: 50px; /* 세로로 긴 이미지의 너비 조정 */
        }

        .cloud img {
            width: 280px; /* 새로운 이미지의 너비 조정 */
        }
        .cloud2 img {
            width: 180px; /* 새로운 이미지의 너비 조정 */
        }
        .cloud3 img {
            width: 180px; /* 새로운 이미지의 너비 조정 */
        }

        /* 웹 환경에서 중앙에 위치하도록 조정 */
        @media screen and (min-width: 376px) {
            .background-container {
                width: 375px; /* 고정된 박스 너비 */
                height: 812px; /* 고정된 박스 높이 */
            }
        }
    </style>
</head>
<body>
    <div class="background-container">
        <a href="page1.html" class="button button1">
            <img src="imgMain/s1.png" alt="s1">
        </a>
        <a href="page2.html" class="button button2">
            <img src="imgMain/s2.png" alt="s2">
        </a>
        <a href="page3.html" class="button button3">
            <img src="imgMain/s3.png" alt="s3">
        </a>
        <a href="page4.html" class="button button4">
            <img src="imgMain/s4.png" alt="s4">
        </a>
        <div class="cloud cloud1">
            <img src="imgMain/cloud.png" alt="cloud1">
        </div>
        <div class="cloud cloud2">
            <img src="imgMain/cloud.png" alt="cloud2">
        </div>
        <div class="cloud cloud3">
            <img src="imgMain/cloud.png" alt="cloud3">
        </div>
    </div>
</body>
</html>

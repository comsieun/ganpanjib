<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Murphy’s Delivery Service</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <button id="startButton">START</button>
    <button id="leftButton" class="direction-button"></button>
    <button id="rightButton" class="direction-button"></button>
    <button id="stopButton"><img id="stopButtonImage" src="img/stop.png" alt="Pause"></button>
    <div id="emergencyTimer" class="info">돌발 상황이 일어나기까지... 30초</div>
    <img id="gameover" src="img/gameover.png">
    <img id="fever" src="img/fever.png">
    <script src="script.js"></script>
</body>
</html>
